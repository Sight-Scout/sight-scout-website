name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Claims lint (SPEC.md §11)
        working-directory: site
        run: npm run lint:claims

      - name: Verify legal pages are verbatim (SPEC.md §11)
        working-directory: site
        run: npm run verify:legal

      - name: Build
        working-directory: site
        run: npm run build
